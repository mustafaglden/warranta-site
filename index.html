<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warranta — Never lose a warranty again</title>
<meta name="description" content="Warranta keeps your receipts, warranties and return windows in one private, on-device vault — and reminds you before they expire.">
<style>
  :root { --bg:#0E0F1B; --card:#171827; --border:#262838; --text:#F4F5FA; --muted:#9BA0B4; --gold:#FFD64D; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }
  main { flex:1; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
  .hero { max-width:520px; }
  .badge { width:76px; height:76px; border-radius:20px; background:linear-gradient(135deg,var(--gold),#E0A62A); margin:0 auto 24px; display:flex; align-items:center; justify-content:center; font-size:38px; box-shadow:0 12px 40px rgba(255,214,77,.18); }
  h1 { font-size:2.6rem; font-weight:800; letter-spacing:-.03em; margin-bottom:14px; }
  p.sub { color:var(--muted); font-size:1.15rem; max-width:440px; margin:0 auto 28px; line-height:1.6; }
  .cta { display:inline-block; background:linear-gradient(135deg,var(--gold),#E0A62A); color:#111; text-decoration:none; padding:15px 34px; border-radius:14px; font-weight:700; font-size:1.05rem; }
  .tags { margin-top:22px; color:var(--muted); font-size:.9rem; }
  footer { text-align:center; padding:24px; border-top:1px solid var(--border); color:var(--muted); font-size:.88rem; }
  footer a { color:var(--gold); text-decoration:none; margin:0 10px; }
  footer a:hover { text-decoration:underline; }
</style>
</head>
<body>
  <main>
    <div class="hero">
      <div class="badge">🛡️</div>
      <h1>Warranta</h1>
      <p class="sub">Never lose a warranty again. Scan any receipt — Warranta tracks the warranty and return window, and reminds you before they expire. Everything stays on your device.</p>
      <!-- TODO: App Store id'sini doğrula (proje bağlamı: 6758915953) -->
      <a class="cta" href="https://apps.apple.com/app/id6758915953">Download on the App Store</a>
      <div class="tags">No accounts · No ads · No tracking · On-device</div>
    </div>
  </main>
  <footer>
    <a href="./privacy.html">Privacy Policy</a>·<a href="./terms.html">Terms of Service</a>
  </footer>
</body>
</html>
